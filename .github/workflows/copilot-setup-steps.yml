name: Copilot Setup Steps

on:
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: python-backend/requirements.txt

      - name: Install Linux runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2t64 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libcups2 \
            libdrm2 \
            libgbm1 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libsndfile1 \
            libxrandr2 \
            libxshmfence1 \
            libxss1 \
            xauth \
            xvfb

      - name: Install Node.js dependencies
        run: npm ci

      - name: Create Python virtual environment
        run: python -m venv .venv

      - name: Install Python dependencies (runtime + dev tools required by `npm run verify`)
        run: |
          ./.venv/bin/pip install --upgrade pip
          ./.venv/bin/pip install -e ".[dev]"

      - name: Expose workspace virtualenv
        run: |
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
          echo "AUDIO_WANDAS_ANALYZER_PYTHON_COMMAND=$GITHUB_WORKSPACE/.venv/bin/python" >> "$GITHUB_ENV"

      - name: Warm compile output
        run: npm run compile

      - name: Pre-download VS Code for E2E tests
        run: node -e "require('@vscode/test-electron').downloadAndUnzipVSCode('stable')"
