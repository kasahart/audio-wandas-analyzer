name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build VSIX and publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            python-backend/requirements.txt
            pyproject.toml

      - name: Install Linux runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libsndfile1

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dev dependencies
        run: pip install -e ".[dev]"

      - name: Validate tag matches package version
        run: |
          tag="${GITHUB_REF_NAME}"
          pkg_version="$(node -p "require('./package.json').version")"
          expected_tag="v${pkg_version}"
          if [ "$tag" != "$expected_tag" ]; then
            echo "Tag $tag does not match package.json version $pkg_version (expected $expected_tag)." >&2
            exit 1
          fi

      - name: Run verify checks
        run: npm run verify

      - name: Build VSIX
        run: npm run package:vsix

      - name: Locate VSIX
        id: vsix
        run: |
          file=$(ls -1 *.vsix | head -n 1)
          echo "path=$file" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ steps.vsix.outputs.path }}
          generate_release_notes: true

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx --no-install vsce publish --no-yarn --packagePath "${{ steps.vsix.outputs.path }}"
