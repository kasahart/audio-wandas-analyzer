name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify (compile + lint + node:test + ruff + pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            python-backend/requirements.txt
            pyproject.toml

      - name: Install Linux runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libsndfile1

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dev dependencies
        run: pip install -e ".[dev]"

      - name: Run verify
        run: npm run verify

  test-ui:
    name: test:ui (Playwright Chromium smoke)
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run UI smoke
        run: npm run test:ui

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/

  e2e:
    name: e2e (VS Code extension host)
    runs-on: ubuntu-latest
    needs: [verify, test-ui]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            python-backend/requirements.txt
            pyproject.toml

      - name: Install Linux + xvfb dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2t64 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libcups2 \
            libdrm2 \
            libgbm1 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libsndfile1 \
            libxrandr2 \
            libxshmfence1 \
            libxss1 \
            xauth \
            xvfb

      - name: Install Node dependencies
        run: npm ci

      - name: Create workspace venv (E2E expects .venv/bin/python)
        run: |
          python -m venv .venv
          ./.venv/bin/pip install --upgrade pip
          ./.venv/bin/pip install -e ".[dev]"

      - name: Run E2E
        run: npm run verify:e2e
